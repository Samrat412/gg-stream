# Nginx Configuration for Prime Video Style Streaming Site

server {
    listen 80;
    server_name www.yourdomain.com yourdomain.com;
    
    # Redirect HTTP to HTTPS (uncomment in production)
    # return 301 https://$server_name$request_uri;
    
    root /var/www/streamhub/public;
    index index.php;
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    
    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|svg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public";
    }
    
    location ~* \.(woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
    
    # Protect sensitive directories
    location ~ /(cache|storage|config)/ {
        deny all;
        return 404;
    }
    
    location ~ /\. {
        deny all;
        return 404;
    }
    
    # PHP handling
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
    }
    
    # Main routing - all requests through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Deny access to sitemap and robots from non-bot user agents (optional)
    # location = /sitemap.xml {
    #     if ($http_user_agent !~* (googlebot|bingbot|slurp|duckduckbot|baiduspider|yandexbot)) {
    #         return 403;
    #     }
    #     try_files $uri /index.php;
    # }
    
    # location = /robots.txt {
    #     try_files $uri /index.php;
    # }
}

